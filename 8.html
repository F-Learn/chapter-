<script>
    // Chapter 8: Management of the Older Adult Patient – exact 38 questions (items 1–38)
    const questions = [
        {
            id: 1,
            question: "1. The nurse is providing care for an 82-year-old client whose signs and symptoms of Parkinson disease have worsened. The client reports no longer being able to do as many things as in the past. Based on this statement, what issue is of most concern to the client?",
            options: [
                "A. Neurologic deficits",
                "B. Loss of independence",
                "C. Age-related changes",
                "D. Tremors and decreased mobility"
            ],
            correct: 1, // B
            rationale: "This client's statement places a priority on a loss of independence, not specific symptoms. This is undoubtedly a result of the neurologic changes associated with the disease, but this is not the focus of the statement. This is a disease process, not an age-related physiologic change. (PTS:1 REF:p.168)"
        },
        {
            id: 2,
            question: "2. Which age-related physiologic change contributes to heart disease being the leading cause of death in older adults?",
            options: [
                "A. Heart muscle and arteries lose their elasticity.",
                "B. Systolic blood pressure decreases.",
                "C. Resting heart rate decreases with age.",
                "D. Atrial-septal defects develop with age."
            ],
            correct: 0, // A
            rationale: "With age, heart muscle and arteries lose their elasticity, resulting in a reduced stroke volume. Systolic blood pressure does not decrease, resting heart rate does not decrease, and atrial-septal defects are not more likely to develop with age. (PTS:1 REF:p.169)"
        },
        {
            id: 3,
            question: "3. An occupational health nurse overhears an employee saying to a manager about a 65-year-old coworker: 'You should just retire and make way for some new blood.' Which phenomenon should the nurse identify?",
            options: [
                "A. Intolerance",
                "B. Ageism",
                "C. Dependence",
                "D. Nonspecific prejudice"
            ],
            correct: 1, // B
            rationale: "Ageism refers to prejudice against the aged. Intolerance is implied, but the intolerance is aimed at the coworker's age. The statement does not raise concern about dependence. The prejudice exhibited is very specific. (PTS:1 REF:p.176)"
        },
        {
            id: 4,
            question: "4. An 80-year-old client is admitted for dehydration and syncope, found hypotensive, IV fluids ordered. What teaching strategies should the nurse review?",
            options: [
                "A. Before ambulation the client should rise slowly and take mini breaks between lying, sitting, and standing.",
                "B. Increase consumption of meals to three times a day, with the largest meal being at breakfast.",
                "C. The client must use a rolling walker and call for assistance with any change in position.",
                "D. The temperature in the room should stay very hot, and bathing in hot water is appropriate."
            ],
            correct: 0, // A
            rationale: "A client experiencing hypotension should rise slowly. The client should consider five or six small meals a day to minimize postprandial hypotension. Extremes in temperature, especially hot showers, should be avoided. Not every client needs a walker. (PTS:1 REF:p.171)"
        },
        {
            id: 5,
            question: "5. A 76-year-old client in the ED reports nausea, dyspnea, and shoulder pain. Spouse states client woke up confused, unsteady, pale. Which problem is most likely occurring?",
            options: [
                "A. Myocardial ischemia",
                "B. Urinary tract infection",
                "C. Lung cancer",
                "D. Chronic obstructive pulmonary disease"
            ],
            correct: 0, // A
            rationale: "Older adults may have atypical pain (upper body rather than substernal). Vague symptoms: nausea, vomiting, syncope, mental status changes, dyspnea may indicate MI. UTI may present with mental changes but usually with urinary sx. Lung cancer and COPD present with respiratory changes. (PTS:1 REF:p.171)"
        },
        {
            id: 6,
            question: "6. A 65-year-old client reports occasional constipation over past 6 months. What intervention should the nurse first suggest?",
            options: [
                "A. Reduce stress.",
                "B. Increase carbohydrate intake and reduce protein intake.",
                "C. Take herbal laxatives (senna) each night.",
                "D. Increase daily intake of water."
            ],
            correct: 3, // D
            rationale: "Constipation common in older adults; increasing fluid intake is an appropriate early intervention, prior to recommending laxatives. Stress reduction unlikely to wholly resolve. No need to alter carbs/protein. (PTS:1 REF:p.173)"
        },
        {
            id: 7,
            question: "7. An 80-year-old client with hypertension now requires oxygen in hospital. Client asks why oxygen needed (never smoked, feels fine). Oxygen required because of which respiratory changes?",
            options: [
                "A. As a therapeutic measure to encourage coughing and deep breathing",
                "B. Diminished respiratory efficiency and declining aerobic capacity",
                "C. To increase inspiratory and expiratory force of lungs",
                "D. Lung mass increases and residual volume decreases"
            ],
            correct: 1, // B
            rationale: "Diminished respiratory efficiency and declining aerobic capacity are age-related. Healthy older adults compensate, but stress from illness increases oxygen demand. Oxygen is a drug, not used to encourage coughing. Lung mass decreases, residual volume increases. (PTS:1 REF:p.171)"
        },
        {
            id: 8,
            question: "8. The nurse is providing education to a client with early-stage Alzheimer disease (AD) prescribed donepezil. What should the nurse explain?",
            options: [
                "A. It slows the progression of AD.",
                "B. It cures AD in a small minority of clients.",
                "C. It removes the client's insight that they have AD.",
                "D. It eliminates the physical effects of AD and other dementias."
            ],
            correct: 0, // A
            rationale: "There is no cure for AD, but several medications (including donepezil) have been introduced to slow progression. They do not eliminate the disease but can alleviate some symptoms. (PTS:1 REF:p.184)"
        },
        {
            id: 9,
            question: "9. An 81-year-old client has fallen three times in the past month without injury. This client is at high risk for which type of injury?",
            options: [
                "A. A hip fracture",
                "B. A femoral fracture",
                "C. Pelvic dysplasia",
                "D. Tearing of a meniscus or bursa"
            ],
            correct: 0, // A
            rationale: "The most common fracture resulting from a fall is a fractured hip due to osteoporosis and the fall itself. Other injuries are possible but less likely. (PTS:1 REF:p.187)"
        },
        {
            id: 10,
            question: "10. The case manager is working with an 84-year-old client. Which factors enhance coping in this age group? (Select all that apply.)",
            options: [
                "A. Decreased risk taking",
                "B. Effective adaptation skills",
                "C. Avoiding participation in untested roles",
                "D. Increased life experience",
                "E. Resilience during change"
            ],
            correct: [1,3,4], // B, D, E
            rationale: "Because changes in life patterns are inevitable, older clients need resilience and coping skills. It is beneficial to participate in risk taking and new roles, not avoid them. Effective adaptation, life experience, and resilience are positive. (PTS:1 REF:p.176)"
        },
        {
            id: 11,
            question: "11. A nurse administering IM influenza vaccine at an extended care facility. Which age-related change should the nurse be aware of?",
            options: [
                "A. less subcutaneous tissue and less muscle mass than a younger client.",
                "B. more subcutaneous tissue and less durable skin than a younger client.",
                "C. more superficial and tortuous nerve distribution.",
                "D. a higher risk of bleeding after an IM injection."
            ],
            correct: 0, // A
            rationale: "In an older client, subcutaneous fat diminishes, particularly in the extremities. Muscle mass also decreases. No significant differences in nerve distribution or bleeding risk. (PTS:1 REF:p.170)"
        },
        {
            id: 12,
            question: "12. Admissions nurse asks if a 78-year-old client has an advance directive. Client says no, doesn't want anyone controlling finances. What is appropriate information?",
            options: [
                "A. 'Advance directives are not legal documents, so you have nothing to worry about.'",
                "B. 'Advance directives are limited only to health care instructions and directives.'",
                "C. 'Your finances cannot be managed without an advance directive.'",
                "D. 'Advance directives are implemented when you become incapacitated, when you will use a living will to allow the state to manage your money.'"
            ],
            correct: 1, // B
            rationale: "An advance directive provides instructions for care (living will) or names a proxy decision maker for health care. It covers only health care issues, not finances. Financial issues are addressed with a durable power of attorney for finances. (PTS:1 REF:p.190)"
        },
        {
            id: 13,
            question: "13. A nurse is planning discharge education for an 81-year-old client with mild short-term memory loss. The nurse should take which action?",
            options: [
                "A. Set long-term goals with the client.",
                "B. Provide a list of useful websites.",
                "C. Keep visual cues to a minimum to enhance focus.",
                "D. Keep teaching periods short."
            ],
            correct: 3, // D
            rationale: "To assist older adult with short-term memory loss, keep teaching periods short, provide glare-free lighting, link new info with familiar, use visual/auditory cues, set short-term goals. (PTS:1 REF:p.179)"
        },
        {
            id: 14,
            question: "14. The nurse is planning an educational event on normal age-related physiologic changes. What phenomenon should the nurse address?",
            options: [
                "A. A decrease in cognition, judgment, and memory",
                "B. A decrease in muscle mass and bone density",
                "C. The disappearance of sexual desire for both men and women",
                "D. An increase in sebaceous and sweat gland function"
            ],
            correct: 1, // B
            rationale: "Normal signs of aging include decrease in smell, muscle mass, decline but not disappearance of sexual desire, decreased sebaceous and sweat glands. Cognitive changes are usually pathologic, not healthy aging. (PTS:1 REF:p.174)"
        },
        {
            id: 15,
            question: "15. A home health nurse observes a 90-year-old with cardiovascular disease exhibiting subtle unprecedented signs of confusion and agitation. What should the nurse do?",
            options: [
                "A. Increase frequency of home care.",
                "B. Have a family member check in the evening.",
                "C. Arrange for the client to see their primary care provider.",
                "D. Refer the client to an adult day program."
            ],
            correct: 2, // C
            rationale: "Sudden confusion/hallucinations may indicate multi-infarct dementia, associated with cardiovascular disease. The nurse should arrange for primary care provider evaluation. (PTS:1 REF:p.181)"
        },
        {
            id: 16,
            question: "16. A 71-year-old client reports taking herbal remedies. What should the nurse include in education?",
            options: [
                "A. Herbal remedies are consistent with holistic health care.",
                "B. Herbal remedies are often cheaper than prescribed medication.",
                "C. It is safest to avoid the use of herbal remedies.",
                "D. There is a need to inform the primary care provider and pharmacist about the herbal remedies."
            ],
            correct: 3, // D
            rationale: "Herbal remedies combined with prescribed medications can lead to toxic interactions. Clients should notify HCP and pharmacist. (PTS:1 REF:p.180)"
        },
        {
            id: 17,
            question: "17. A 54-year-old postmenopausal female reports painful intercourse. What physical change accounts for this?",
            options: [
                "A. Thickening of the vaginal wall",
                "B. Increased vaginal secretions",
                "C. Shortening of the vagina",
                "D. Increased pubococcygeal muscle tone"
            ],
            correct: 2, // C
            rationale: "Menopause: decreased estrogen/progesterone causes thinning of vaginal wall, decreased secretions, decreased pelvic muscle tone, and shortening of vagina, which may cause painful intercourse. (PTS:1 REF:p.172)"
        },
        {
            id: 18,
            question: "18. A 62-year-old woman with urinary incontinence wears disposable panties, avoids fluids after 5pm, considers it part of aging. What priority advice?",
            options: [
                "A. 'While urinary incontinence is part of aging, see your HCP.'",
                "B. 'You probably have a UTI, start drinking cranberry juice.'",
                "C. 'You could purchase pads to place into washable panties.'",
                "D. 'Urinary incontinence is not part of aging. See your HCP and increase water intake.'"
            ],
            correct: 3, // D
            rationale: "Incontinence is not normal due to aging. Focus should be on getting evaluated by HCP. Adequate fluid decreases likelihood of bladder infection. (PTS:1 REF:p.172)"
        },
        {
            id: 19,
            question: "19. A 59-year-old client's annual physical. One of the first physical signs of aging is what?",
            options: [
                "A. More frequent aches and pains",
                "B. Failing eyesight, especially close vision",
                "C. Increasing loss of muscle tone",
                "D. Accepting limitations while developing assets"
            ],
            correct: 1, // B
            rationale: "Failing eyesight, especially close vision, is one of the first signs of aging in middle life. More frequent aches begin in 'early' late years (65-79). Loss of muscle tone occurs later (80+). Accepting limitations is socialization development. (PTS:1 REF:p.175)"
        },
        {
            id: 20,
            question: "20. A gerontologic nurse is aware of demographic changes. Which demographic change has the biggest impact?",
            options: [
                "A. More families providing care for aging members.",
                "B. Adult children participating in chronic disease management.",
                "C. A growing number of people live to a very old age.",
                "D. Older adults having more accidents, increasing costs."
            ],
            correct: 2, // C

    let currentQuestion = 0;
    let selectedOption = null;
    let answers = Array(questions.length).fill(null);

    function loadQuestion() {
        const q = questions[currentQuestion];
        if (!q) return;

        const progress = ((currentQuestion + 1) / questions.length) * 100;
        document.getElementById('progressBar').style.width = `${progress}%`;
        document.getElementById('counter').textContent = `${currentQuestion + 1}/${questions.length}`;
        document.getElementById('questionNumber').textContent = q.id;

        document.getElementById('question').innerHTML = q.question;
        loadOptions(q);

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');

        document.getElementById('prevBtn').disabled = currentQuestion === 0;
        const stored = answers[currentQuestion];
        document.getElementById('nextBtn').disabled = stored === null || stored === undefined;
        document.getElementById('nextBtn').textContent = currentQuestion >= questions.length - 1 ? 'Finish ➡️' : 'Next ➡️';
    }

    function loadOptions(q) {
        const container = document.getElementById('options');
        container.innerHTML = '';
        q.options.forEach((opt, idx) => {
            const div = document.createElement('div');
            div.className = 'option';
            div.innerHTML = `<div class="option-letter">${String.fromCharCode(65 + idx)}</div><div>${opt}</div>`;
            div.onclick = () => selectOption(idx);
            container.appendChild(div);
        });

        const saved = answers[currentQuestion];
        if (saved !== null && saved !== undefined) {
            selectOption(saved, true);
        }
    }

    function selectOption(index, fromMemory = false) {
        const q = questions[currentQuestion];
        if (!fromMemory && selectedOption !== null) return;

        if (!fromMemory) {
            selectedOption = index;
            answers[currentQuestion] = index;
        }

        highlightSelected(index, q);
        showFeedback(index, q);
        document.getElementById('nextBtn').disabled = false;
        document.getElementById('cancelBtn').classList.add('show');
    }

    function highlightSelected(index, q) {
        const opts = document.querySelectorAll('.option');
        opts.forEach((opt, i) => opt.classList.remove('correct', 'incorrect'));

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        if (Array.isArray(q.correct)) {
            correctIndices.forEach(ci => opts[ci]?.classList.add('correct'));
            if (!correctIndices.includes(index)) {
                opts[index]?.classList.add('incorrect');
            }
        } else {
            if (index === q.correct) {
                opts[index].classList.add('correct');
            } else {
                opts[index].classList.add('incorrect');
                opts[q.correct].classList.add('correct');
            }
        }
    }

    function showFeedback(index, q) {
        const fb = document.getElementById('feedback');
        const icon = document.getElementById('feedbackIcon');
        const text = document.getElementById('feedbackText');
        const rationaleDiv = document.getElementById('rationale');
        const rationaleP = document.getElementById('rationaleText');

        const correctIndices = Array.isArray(q.correct) ? q.correct : [q.correct];
        const isCorrect = correctIndices.includes(index);

        if (isCorrect) {
            fb.className = 'feedback correct';
            icon.textContent = '✅';
            text.textContent = 'CORRECT! Well done.';
        } else {
            fb.className = 'feedback incorrect';
            icon.textContent = '❌';
            const letters = correctIndices.map(c => String.fromCharCode(65 + c)).join(', ');
            text.textContent = `INCORRECT. The correct answer(s): ${letters}`;
        }

        fb.style.display = 'flex';
        rationaleP.innerHTML = q.rationale;
        rationaleDiv.classList.add('show');
    }

    function cancelSelection() {
        const q = questions[currentQuestion];
        selectedOption = null;
        answers[currentQuestion] = null;
        document.querySelectorAll('.option').forEach(opt => opt.classList.remove('correct', 'incorrect'));
        document.getElementById('feedback').style.display = 'none';
        document.getElementById('rationale').classList.remove('show');
        document.getElementById('cancelBtn').classList.remove('show');
        document.getElementById('nextBtn').disabled = true;
    }

    function nextCard() {
        if (currentQuestion < questions.length - 1) {
            currentQuestion++;
            selectedOption = null;
            loadQuestion();
        } else {
            currentQuestion = 0;
            loadQuestion();
        }
    }

    function previousCard() {
        if (currentQuestion > 0) {
            currentQuestion--;
            selectedOption = answers[currentQuestion];
            loadQuestion();
        }
    }

    // keyboard shortcuts
    document.addEventListener('keydown', function(e) {
        if (e.key >= '1' && e.key <= '4') selectOption(parseInt(e.key)-1);
        else if (e.key >= 'a' && e.key <= 'd') selectOption(e.key.charCodeAt(0)-97);
        else if (e.key >= 'A' && e.key <= 'D') selectOption(e.key.charCodeAt(0)-65);
        else if (e.key === 'ArrowLeft' && !document.getElementById('prevBtn').disabled) previousCard();
        else if (e.key === 'ArrowRight' && !document.getElementById('nextBtn').disabled) nextCard();
        else if (e.key === 'Escape' && document.getElementById('cancelBtn').classList.contains('show')) cancelSelection();
    });

    loadQuestion();
</script>
